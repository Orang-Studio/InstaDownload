Name: InstaDownload
Summary: Download Instagram videos directly to your device
Description: |-
  InstaDownload lets you download Instagram videos directly to your phone
  without any server backend. Everything runs locally on your device.

  Paste an Instagram post URL, tap Download, and the video is saved to
  your Downloads folder. Supports both public posts and private posts
  you have access to. Carousel posts (multiple media) are also supported.

  Built with Chaquopy to run Instaloader (a Python library) inside the APK,
  so no external server or API keys are required.

  Features:
  * Paste any Instagram post URL and download the video
  * Fully local — no server, no tracking, no ads
  * Supports carousel posts (multiple videos/images)
  * Videos saved to the Downloads folder
  * Light and dark theme support

  Note: Only download content you have permission to download. Respect
  Instagram's Terms of Service.

